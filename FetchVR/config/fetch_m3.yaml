behaviors:
  FetchPet:
    trainer_type: ppo
    hyperparameters:
      batch_size: 8192
      buffer_size: 81920
      learning_rate: 2.0e-5
      beta: 2.0e-4
      epsilon: 0.10
      lambd: 0.95
      num_epoch: 5
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    init_path: results/fetch_m2/M3_base.pt
    max_steps: 2500000
    time_horizon: 512
    summary_freq: 5000
    keep_checkpoints: 60
    checkpoint_interval: 25000
