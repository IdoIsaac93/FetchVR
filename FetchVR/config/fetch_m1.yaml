behaviors:
  FetchPet:
    trainer_type: ppo
    hyperparameters:
      batch_size: 8192
      buffer_size: 81920
      learning_rate: 5.0e-5
      beta: 1.0e-3
      epsilon: 0.15
      lambd: 0.95
      num_epoch: 5
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    init_path: results/fetch_new/FetchPet/FetchPet-1874746.pt
    max_steps: 2000000
    time_horizon: 512
    summary_freq: 5000
    keep_checkpoints: 40
    checkpoint_interval: 25000
